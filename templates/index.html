<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
    >

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Focus Manager Ultimate
    </title>

    <!--
    Chart.js 图表库
    -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--
    Google Font
    -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        /*
        ====================================
        全局
        ====================================
        */

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

        body {

            font-family: "Poppins", sans-serif;

            min-height: 100vh;

            background:
                linear-gradient(
                    135deg,
                    #141e30,
                    #243b55
                );

            color: white;

            overflow-x: hidden;

            padding: 40px;
        }

        /*
        ====================================
        主容器
        ====================================
        */

        .container {

            max-width: 1200px;

            margin: auto;

            padding: 35px;

            border-radius: 30px;

            backdrop-filter: blur(20px);

            background:
                rgba(255,255,255,0.08);

            box-shadow:
                0 0 50px
                rgba(0,0,0,0.35);
        }

        /*
        ====================================
        标题
        ====================================
        */

        h1 {

            text-align: center;

            margin-bottom: 35px;

            font-size: 48px;

            font-weight: 700;
        }

        /*
        ====================================
        输入区域
        ====================================
        */

        .input-panel {

            display: flex;

            flex-direction: column;

            gap: 20px;

            margin-bottom: 40px;
        }

        input {

            width: 100%;

            padding: 18px;

            border: none;

            border-radius: 18px;

            font-size: 18px;

            outline: none;

            background:
                rgba(255,255,255,0.12);

            color: white;
        }

        input::placeholder {

            color: rgba(255,255,255,0.65);
        }

        /*
        ====================================
        分数输入
        ====================================
        */

        .score-panel {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;
        }

        /*
        ====================================
        按钮
        ====================================
        */

        button {

            padding: 16px 24px;

            border: none;

            border-radius: 16px;

            font-size: 17px;

            font-weight: 600;

            cursor: pointer;

            transition: all 0.25s ease;

            background:
                linear-gradient(
                    135deg,
                    #00c6ff,
                    #0072ff
                );

            color: white;
        }

        button:hover {

            transform: translateY(-3px);

            box-shadow:
                0 8px 25px
                rgba(0,114,255,0.45);
        }

        /*
        ====================================
        任务列表
        ====================================
        */

        #taskList {

            margin-top: 30px;
        }

        /*
        ====================================
        计时区域
        ====================================
        */

        .timer-panel {

            margin-top: 50px;

            padding: 30px;

            border-radius: 25px;

            background:
                rgba(255,255,255,0.08);

            text-align: center;
        }

        #timerDisplay {

            font-size: 54px;

            margin-bottom: 30px;

            font-weight: 700;
        }

        .timer-buttons {

            display: flex;

            justify-content: center;

            gap: 20px;

            flex-wrap: wrap;
        }

        /*
        ====================================
        Canvas
        ====================================
        */

        #fireworksCanvas {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            pointer-events: none;

            z-index: 9999;
        }

        /*
        ====================================
        卡片动画
        ====================================
        */

        .task-card {

            animation:
                fadeIn 0.5s ease;
        }

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(20px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

        /*
        ====================================
        响应式
        ====================================
        */

        @media(max-width:768px) {

            h1 {

                font-size: 34px;
            }

            .score-panel {

                grid-template-columns: 1fr;
            }

            #timerDisplay {

                font-size: 42px;
            }
        }

    </style>

</head>

<body>

    <!--
    GPU 烟花画布
    -->

    <canvas id="fireworksCanvas"></canvas>

    <!--
    主容器
    -->

    <div class="container">

        <!--
        标题
        -->

        <h1>
            🚀 Focus Manager Ultimate
        </h1>

        <!--
        输入区域
        -->

        <div class="input-panel">

            <input
                type="text"
                id="taskInput"
                placeholder="请输入今天要完成的任务..."
            >

            <div class="score-panel">

                <input
                    type="number"
                    id="urgentInput"
                    min="1"
                    max="10"
                    value="5"
                    placeholder="紧急程度（1-10）"
                >

                <input
                    type="number"
                    id="importantInput"
                    min="1"
                    max="10"
                    value="5"
                    placeholder="重要程度（1-10）"
                >

            </div>

            <button onclick="addTask()">

                ➕ 提交任务

            </button>

        </div>

        <!--
        评分说明
        -->

        <div
            style="
                margin-bottom:30px;
                opacity:0.85;
                line-height:1.8;
            "
        >

            <p>
                📌 紧急程度：
                越高表示越需要立即完成
            </p>

            <p>
                📌 重要程度：
                越高表示对长期目标越关键
            </p>

            <p>
                📌 综合评分：
                紧急 × 40%
                +
                重要 × 60%
            </p>

        </div>

        <!--
        任务列表
        -->

        <div id="taskList"></div>

        <!--
        计时区域
        -->

        <div class="timer-panel">

            <h2
                style="
                    margin-bottom:25px;
                    font-size:32px;
                "
            >
                ⏱ 专注计时器
            </h2>

            <div id="timerDisplay">

                0分 0秒

            </div>

            <div class="timer-buttons">

                <button
                    onclick="startTimer(event)"
                >
                    ▶ 开始计时
                </button>

                <button
                    onclick="pauseTimer(event)"
                >
                    ⏸ 暂停计时
                </button>

                <button
                    onclick="endTimer(event)"
                >
                    🏁 结束计时
                </button>

            </div>

        </div>

    </div>

    <!--
    script.js
    -->

    <script
    src="{{ url_for('static', filename='script.js') }}"
></script>

</body>

</html>
